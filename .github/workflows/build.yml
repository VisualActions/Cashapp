name: Xcode Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      # Step 3: Convert the private local scheme into a shared scheme
      - name: Make Schemes Shared
        run: |
          PROJECT_DIR="CashappSpoof.xcodeproj"
          USERDATA_DIR="$PROJECT_DIR/xcuserdata"
          SHARED_DIR="$PROJECT_DIR/xcshareddata/xcschemes"

          mkdir -p "$SHARED_DIR"

          if [ -d "$USERDATA_DIR" ]; then
            find "$USERDATA_DIR" -name "*.xcscheme" -exec cp {} "$SHARED_DIR/" \;
            echo "Successfully converted private schemes to shared schemes!"
            ls -la "$SHARED_DIR"
          else
            echo "Warning: No xcuserdata folder found to convert."
          fi

      # Step 4: Dynamically locate available simulator and build
      - name: Select Simulator and Build
        run: |
          # Check if iPhone 15 exists; if not, parse and pick the first available iPhone model
          if xcrun simctl list devices available | grep -q "iPhone 15"; then
            DEST='platform=iOS Simulator,name=iPhone 15,OS=latest'
          else
            NAME=$(xcrun simctl list devices available | grep -m1 "iPhone" | sed -E 's/ *([^()]+) .*/\1/; s/^[ \t]*//; s/[ \t]*$//')
            DEST="platform=iOS Simulator,name=${NAME},OS=latest"
          fi
          
          echo "Using simulator destination: $DEST"
          
          xcodebuild clean build \
            -project "CashappSpoof.xcodeproj" \
            -scheme "CashappSpoof" \
            -destination "$DEST"
