name: Xcode Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      # Step 3: Convert the private local scheme into a shared scheme
      - name: Make Schemes Shared
        run: |
          PROJECT_DIR="CashappSpoof.xcodeproj"
          USERDATA_DIR="$PROJECT_DIR/xcuserdata"
          SHARED_DIR="$PROJECT_DIR/xcshareddata/xcschemes"

          # Create the destination directory if it doesn't exist
          mkdir -p "$SHARED_DIR"

          # Find any .xcscheme files inside the private xcuserdata folder and copy them over
          if [ -d "$USERDATA_DIR" ]; then
            find "$USERDATA_DIR" -name "*.xcscheme" -exec cp {} "$SHARED_DIR/" \;
            echo "Successfully converted private schemes to shared schemes!"
            ls -la "$SHARED_DIR"
          else
            echo "Warning: No xcuserdata folder found to convert."
          fi

      # Step 4: Run the build with the newly shared scheme
      - name: Build Project
        run: |
          xcodebuild clean build \
            -project "CashappSpoof.xcodeproj" \
            -scheme "CashappSpoof" \
            -destination 'platform=iOS Simulator,name=iPhone 15'
