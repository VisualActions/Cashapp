name: Xcode Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      # Step 1: Download your repository files onto the GitHub runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up the latest stable version of Xcode tools
      - name: Set Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      # Step 3: Automatically generate schemes and compile the app
      - name: Build Project
        run: |
          xcodebuild clean build \
            -project "CashappSpoof.xcodeproj" \
            -scheme "CashappSpoof" \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -autocreateSchemes \
            -allowProvisioningUpdates
