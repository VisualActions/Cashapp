name: Xcode Unsigned IPA Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Make Schemes Shared
        run: |
          PROJECT_DIR="CashappSpoof.xcodeproj"
          USERDATA_DIR="$PROJECT_DIR/xcuserdata"
          SHARED_DIR="$PROJECT_DIR/xcshareddata/xcschemes"
          mkdir -p "$SHARED_DIR"
          if [ -d "$USERDATA_DIR" ]; then
            find "$USERDATA_DIR" -name "*.xcscheme" -exec cp {} "$SHARED_DIR/" \;
          fi

      # Step 4: Generate a native iOS Archive without checking for signing certificates
      - name: Archive Project (No Code Signing)
        run: |
          xcodebuild archive \
            -project "CashappSpoof.xcodeproj" \
            -scheme "CashappSpoof" \
            -archivePath build/CashappSpoof.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      # Step 5: Convert the .xcarchive into a standard Unsigned .ipa wrapper
      - name: Package Unsigned IPA
        run: |
          # 1. Create the Payload directory structure that iOS packages require
          mkdir -p build/Payload
          
          # 2. Extract and copy the compiled .app directory into the Payload folder
          cp -r build/CashappSpoof.xcarchive/Products/Applications/*.app build/Payload/
          
          # 3. Zip the Payload folder up into an .ipa extension file
          cd build
          zip -r CashappSpoof-Unsigned.ipa Payload
          
          echo "✅ Unsigned IPA created successfully!"
          ls -la

      # Step 6: Upload the final packaged file to GitHub Actions for download
      - name: Upload Unsigned IPA Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CashappSpoof-Unsigned-App
          path: build/CashappSpoof-Unsigned.ipa
